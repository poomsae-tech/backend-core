spring:
  flyway:
    enabled: true
    locations: classpath:db/migration

  logging:
    level:
      org.springframework.web: DEBUG
      org.springframework.security: TRACE
      org.springframework.security.oauth2: TRACE

  datasource:
    url: jdbc:postgresql://${CORE_POSTGRES_HOST}:${CORE_POSTGRES_PORT}/${CORE_POSTGRES_DB}
    username: ${CORE_POSTGRES_USER}
    password: ${CORE_POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  application:
    name: core

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000/

  authentik:
    base-url: ${AUTHENTIK_BASE_URL:http://localhost:9000}
    jwk-uri: ${AUTHENTIK_JWK_URI:http://localhost:9000/application/o/taekwondo-web/jwks/}

  config:
    import: "optional:file:.env[.properties]"

  springdoc:
    api-docs:
      path: /api-docs
    swagger-ui:
      path: /swagger-ui.html
