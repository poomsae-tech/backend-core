spring:
  flyway:
    enabled: true
    locations: classpath:db/migration

  logging:
    level:
      org.springframework.web: DEBUG

  datasource:
    url: jdbc:postgresql://${CORE_POSTGRES_HOST}:${CORE_POSTGRES_PORT}/${CORE_POSTGRES_DB}
    username: ${CORE_POSTGRES_USER}
    password: ${CORE_POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  application:
    name: core

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTHENTIK_JWK_URI:http://localhost:9000/application/o/taekwondo-web/jwks/}
          issuer-uri: ${AUTHENTIK_ISSUER_URI:http://localhost:9000/application/o/taekwondo-web/}

  authentik:
    base-url: ${AUTHENTIK_BASE_URL:http://localhost:9000}

    config:
      import: "optional:file:.env"

  springdoc:
    api-docs:
      path: /api-docs
    swagger-ui:
      path: /swagger-ui.html
