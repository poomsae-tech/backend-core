version: 1
metadata:
  name: Taekwondo - Password Policy
  labels:
    blueprints.goauthentik.io/description: "Password complexity policy for taekwondo platform"

entries:
  - model: authentik_policies_password.passwordpolicy
    state: present
    identifiers:
      name: taekwondo-password-policy
    attrs:
      name: taekwondo-password-policy
      # Minimum password length
      length_min: 10
      # Allowed special characters
      symbol_charset: "!@#$%^&*()_+-=[]{}|;:,.<>?"
      # Minimum counts per character class
      symbols_min: 1
      digits_min: 1
      uppercase_min: 1
      lowercase_min: 1
      # Reject passwords found in HaveIBeenPwned (requires internet access from worker)
      check_have_i_been_pwned: true
      hibp_allowed_count: 0
      # Reject passwords that contain the user's own username or email
      check_static_rules: true
      # Error message shown to the user on policy failure
      error_message: >
        Пароль должен содержать минимум 10 символов, включая заглавную и строчную букву,
        цифру и специальный символ (!@#$%^&*...). Использование имени пользователя
        или электронной почты в пароле запрещено.
